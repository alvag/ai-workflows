# Perfil "write" para el secundario Codex lanzado por cross-model-orca (cross-implement):
# escribe código en el working dir, pero sigue sin necesitar escribir en Jira/Confluence,
# engram ni pencil. Instalar como $CODEX_HOME/<nombre>.config.toml e invocar con:
#   codex exec -p <nombre> -s workspace-write -a on-request --disable hooks ...
# (comando completo POSIX + PowerShell en profiles.md).
#
# Diferencia real con codex-readonly.config.toml: el sandbox (`-s workspace-write` en vez de
# `read-only`) y el approval policy (`-a on-request` en vez de `untrusted`) se pasan como flags
# de invocación, no aquí. Las restricciones de MCP son las mismas que en el perfil read-only: el
# rol "write" de este flujo es "puede escribir código", no "puede escribir en cualquier MCP".
#
# Misma regla fail-closed y misma nota de validación sobre `--strict-config` exigiendo
# transporte completo en cada `mcp_servers.<id>` tocado — ver comentarios en
# codex-readonly.config.toml y mcp-inventory.md.

[features]
apps = false

# ============================================================
# Servidores MCP "conocidos" del flujo (ver mcp-inventory.md)
# ============================================================

[mcp_servers.atlassian-mcp-server]
url = "https://mcp.atlassian.com/v1/mcp/authv2"
enabled = true
disabled_tools = [
  "createJiraIssue",
  "addCommentToJiraIssue",
  "transitionJiraIssue",
  "addWorklogToJiraIssue",
]

[mcp_servers.engram]
command = "engram"
args = ["mcp", "--tools=agent"]
enabled = true
disabled_tools = [
  "mem_save",
  "mem_save_prompt",
  "mem_update",
  "mem_delete",
  "mem_pin",
  "mem_unpin",
  "mem_merge_projects",
  "mem_session_start",
  "mem_session_end",
  "mem_capture_passive",
  "mem_judge",
  "mem_review",
]

# context7: igual que en el perfil read-only, sin bloque propio a propósito (sin tools de
# escritura conocidas, transporte con secreto real -> ver mcp-inventory.md).

[mcp_servers.pencil]
command = "/Applications/Pencil.app/Contents/Resources/app.asar.unpacked/out/mcp-server-darwin-arm64"
args = ["--app", "desktop", "--agent", "codexCLI"]
enabled = false

# ============================================================
# Otros servidores detectados en el entorno, fuera de alcance -> deshabilitados explícitamente.
# ============================================================

[mcp_servers.chrome-devtools]
command = "npx"
args = ["chrome-devtools-mcp@latest"]
enabled = false

[mcp_servers.playwright]
command = "npx"
args = ["@playwright/mcp@latest"]
enabled = false

[mcp_servers.bitbucket]
command = "npx"
args = ["-y", "@aashari/mcp-server-atlassian-bitbucket"]
enabled = false

[mcp_servers.angular-cli]
command = "npx"
args = ["-y", "@angular/cli", "mcp"]
enabled = false

[mcp_servers.node_repl]
command = "node_repl"
enabled = false

[mcp_servers.sites-design-picker]
command = "node"
args = ["./mcp/server.mjs"]
enabled = false

# ============================================================
# Plugins de Codex: mismos motivos que en el perfil read-only.
# ============================================================

[plugins."documents@openai-primary-runtime"]
enabled = false

[plugins."spreadsheets@openai-primary-runtime"]
enabled = false

[plugins."presentations@openai-primary-runtime"]
enabled = false

[plugins."superpowers@openai-curated"]
enabled = false

[plugins."atlassian-rovo@openai-curated"]
enabled = false

[plugins."figma@openai-curated"]
enabled = false

[plugins."pdf@openai-primary-runtime"]
enabled = false

[plugins."chrome@openai-bundled"]
enabled = false

[plugins."template-creator@openai-primary-runtime"]
enabled = false

[plugins."sites@openai-bundled"]
enabled = false

[plugins."visualize@openai-bundled"]
enabled = false

[plugins."browser@openai-bundled"]
enabled = false

# --- Sandbox / approval / hooks: se pasan como flags de invocación (ver profiles.md).
#     Write = `-s workspace-write -a on-request --disable hooks`.
